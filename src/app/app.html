<div class="container">

  <h1>To-Do List</h1>

  <div class="top-section">

    <input type="text" placeholder="Add a new task..." [(ngModel)]="newTask" />

    <select [(ngModel)]="selectedPriority">

      <option>High</option>
      <option>Medium</option>
      <option>Low</option>

    </select>

    <button (click)="addTodo()">

      {{ isEditing ? 'Update' : 'Add' }}

    </button>

  </div>

  <ul>

    <li *ngFor="let task of tasks; let i = index">

      <div class="task-content">

        <span [class.completed]="task.completed" [class.high]="task.priority === 'High'"
          [class.medium]="task.priority === 'Medium'" [class.low]="task.priority === 'Low'">

          {{ task.title }}

        </span>

        <small>
          Priority: {{ task.priority }}
        </small>

      </div>

      <div class="buttons">

        <button *ngIf="!task.completed && !(isEditing && editIndex === i)" (click)="completeTask(i)">
          Completed
        </button>

        <button *ngIf="!isEditing && !task.completed" (click)="editTask(i)">
          Edit
        </button>

        <button (click)="deleteTodo(i)">
          Delete
        </button>

      </div>

    </li>

  </ul>

</div>
