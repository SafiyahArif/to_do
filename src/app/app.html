<div class="container">

  <h1>To-Do List</h1>

  <input
    type="text"
    placeholder="Add a new task..."
    [(ngModel)]="newTask"
  />

  <button (click)="addTodo()">
    Add
  </button>

  <ul>

    <li *ngFor="let task of tasks; let i = index">

      <span>
        {{ task.title }}
      </span>

      <button (click)="deleteTodo(i)">
        Delete
      </button>

    </li>

  </ul>

</div>
